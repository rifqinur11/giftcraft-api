version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: giftcraft_postgres
    restart: always
    environment:
      POSTGRES_USER: giftcraft_user
      POSTGRES_PASSWORD: giftcraft_password
      POSTGRES_DB: giftcraft_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: giftcraft_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@giftcraft.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  pgdata:
    driver: local
